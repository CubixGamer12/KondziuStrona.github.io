<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czy Konrad Tomczyk przyjdzie do szkoły?</title>
    <style>
        :root {
            --color-nie: #ff3838;
            --color-tak: #00ff66;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg-dark) 100%);
            color: #ffffff;
            overflow: hidden;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            letter-spacing: -0.5px;
        }

        h1 span {
            color: #38bdf8;
            display: block;
            font-size: 1.5rem;
            font-weight: 400;
            margin-top: 5px;
        }

        .wheel-outer {
            position: relative;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .wheel-container {
            position: relative;
            width: 360px;
            height: 360px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #334155;
            background: conic-gradient(var(--color-nie) 0% 99%, var(--color-tak) 99% 100%);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            transition: transform 4.5s cubic-bezier(0.15, 0.85, 0.1, 1);
            filter: blur(0px);
        }

        .wheel.spinning {
            filter: blur(1.5px);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #f1f5f9;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            transform-origin: center top;
        }

        .pointer.click {
            animation: pointer-click 0.3s ease-in-out;
        }

        @keyframes pointer-click {
            0% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(-15deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        .center-cap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #334155;
            border: 4px solid #f1f5f9;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            z-index: 5;
        }

        button {
            margin-top: 40px;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #result {
            margin-top: 30px;
            font-size: 28px;
            font-weight: 800;
            min-height: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            opacity: 0;
            transform: scale(0.8);
        }

        #result.show {
            opacity: 1;
            transform: scale(1);
        }

        .legend {
            margin-top: 40px;
            display: flex;
            gap: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
        }

        .box {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Czy Konrad Tomczyk przyjdzie do szkoły? <span>Oficjalne losowanie</span></h1>

    <div class="wheel-outer">
        <div class="wheel-container">
            <div class="pointer" id="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="center-cap"></div>
        </div>
    </div>

    <button id="spin-btn" onclick="spinWheel()">ZAKRĘĆ KOŁEM</button>

    <div id="result"></div>

    <div class="legend">
        <div class="legend-item"><div class="box" style="background: var(--color-nie); box-shadow: 0 0 10px var(--color-nie);"></div> NIE (99%)</div>
        <div class="legend-item"><div class="box" style="background: var(--color-tak); box-shadow: 0 0 10px var(--color-tak);"></div> TAK (1%)</div>
    </div>

    <script>
        let isSpinning = false;
        let currentRotation = 0;

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            
            const wheel = document.getElementById('wheel');
            const pointer = document.getElementById('pointer');
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('spin-btn');

            btn.disabled = true;
            resultDiv.classList.remove('show');
            wheel.classList.add('spinning');
            
            pointer.classList.add('click');

            // Losowanie (1-100)
            const chance = Math.floor(Math.random() * 100) + 1;
            let targetAngle = 0;
            let resultText = "";
            let resultColor = "";

            if (chance === 100) {
                targetAngle = 0; 
                resultText = "🎉 TAK! CUD SIĘ WYDARZYŁ! 🎉";
                resultColor = "#00ff66"; // Poprawione na czysty hex string
            } else {
                targetAngle = Math.floor(Math.random() * 350) + 5;
                resultText = "❌ NIE. Klasyka. ❌";
                resultColor = "#ff3838"; // Poprawione na czysty hex string
            }

            const extraRotations = 360 * 6;
            currentRotation += extraRotations + (360 - targetAngle) - (currentRotation % 360);

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => { pointer.classList.remove('click'); }, 300);

            setTimeout(() => {
                wheel.classList.remove('spinning');
                
                resultDiv.innerText = resultText;
                resultDiv.style.color = resultColor;
                resultDiv.style.textShadow = `0 0 15px ${resultColor}`;
                resultDiv.classList.add('show');
                
                btn.disabled = false;
                isSpinning = false;
            }, 4500);
        }
    </script>

</body>
</html>
